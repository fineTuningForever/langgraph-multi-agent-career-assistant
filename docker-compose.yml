services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: langgraph-job-backend
    ports:
      - "8000:8000"
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./data:/app/data
      - ./.env:/app/.env:ro

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: langgraph-job-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

ial, sans-serif"><tspan x="2080.0" dy="0">finish_node</tspan></text><rect x="2190" y="250" width="120" height="60" rx="18" ry="18" fill="#F6FFED" stroke="#389E0D" stroke-width="3"/><text x="2250.0" y="291.0" text-anchor="middle" font-size="22" font-weight="600" fill="#1F1F1F" font-family="PingFang SC, Helvetica, Arial, sans-serif"><tspan x="2250.0" dy="0">END</tspan></text><rect x="220" y="980" width="300" height="90" rx="18" ry="18" fill="#E6F4FF" stroke="#1677FF" stroke-width="3"/><text x="370.0" y="1034.0" text-anchor="middle" font-size="18" font-weight="500" fill="#1F1F1F" font-family="PingFang SC, Helvetica, Arial, sans-serif"><tspan x="370.0" dy="0">extract_requirements_node</tspan></text><rect x="220" y="1120" width="300" height="90" rx="18" ry="18" fill="#E6F4FF" stroke="#1677FF" stroke-width="3"/><text x="370.0" y="1174.0" text-anchor="middle" font-size="18" font-weight="500" fill="#1F1F1F" font-family="PingFang SC, Helvetica, Arial, sans-serif"><tspan x="370.0" dy="0">position_job_node</tspan></text><rect x="220" y="1245" width="300" height="70" rx="18" ry="18" fill="#F9F0FF" stroke="#722ED1" stroke-width="3"/><text x="370.0" y="1289.0" text-anchor="middle" font-size="18" font-weight="500" fill="#1F1F1F" font-family="PingFang SC, Helvetica, Arial, sans-serif"><tspan x="370.0" dy="0">汇总回主图 analyses</tspan></text><rect x="1280" y="980" width="300" height="90" rx="18" ry="18" fill="#E6F4FF" stroke="#1677FF" stroke-width="3"/><text x="1430.0" y="1034.0" text-anchor="middle" font-size="18" font-weight="500" fill="#1F1F1F" font-family="PingFang SC, Helvetica, Arial, sans-serif"><tspan x="1430.0" dy="0">score_match_node</tspan></text><rect x="1280" y="1120" width="300" height="90" rx="18" ry="18" fill="#E6F4FF" stroke="#1677FF" stroke-width="3"/><text x="1430.0" y="1174.0" text-anchor="middle" font-size="18" font-weight="500" fill="#1F1F1F" font-family="PingFang SC, Helvetica, Arial, sans-serif"><tspan x="1430.0" dy="0">finalize_match_node</tspan></text><rect x="1280" y="1245" width="340" height="70" rx="18" ry="18" fill="#F9F0FF" stroke="#722ED1" stroke-width="3"/><text x="1450.0" y="1289.0" text-anchor="middle" font-size="18" font-weight="500" fill="#1F1F1F" font-family="PingFang SC, Helvetica, Arial, sans-serif"><tspan x="1450.0" dy="0">汇总回主图 matches</tspan></text><rect x="610" y="190" width="300" height="85" rx="14" ry="14" fill="#FFF7E6" stroke="#D48806" stroke-width="2"/><text x="760.0" y="218.5" text-anchor="middle" font-size="16" font-weight="500" fill="#1F1F1F" font-family="PingFang SC, Helvetica, Arial, sans-serif"><tspan x="760.0" dy="0">Command.update</tspan><tspan x="760.0" dy="22">next_step / strategy_reason</tspan><tspan x="760.0" dy="22">messages += Supervisor 决策消息</tspan></text><rect x="1510" y="500" width="360" height="120" rx="14" ry="14" fill="#FFF7E6" stroke="#D48806" stroke-width="2"/><text x="1690.0" y="524.0" text-anchor="middle" font-size="16" font-weight="500" fill="#1F1F1F" font-family="PingFang SC, Helvetica, Arial, sans-serif"><tspan x="1690.0" dy="0">Command.update</tspan><tspan x="1690.0" dy="22">resume_text = optimized_resume</tspan><tspan x="1690.0" dy="22">optimization_round += 1</tspan><tspan x="1690.0" dy="22">shortlist = []</tspan><tspan x="1690.0" dy="22">revision_notes += revision_note</tspan></text><rect x="1880" y="390" width="360" height="120" rx="14" ry="14" fill="#FFF7E6" stroke="#D48806" stroke-width="2"/><text x="2060.0" y="425.0" text-anchor="middle" font-size="16" font-weight="500" fill="#1F1F1F" font-family="PingFang SC, Helvetica, Arial, sans-serif"><tspan x="2060.0" dy="0">Command.update</tspan><tspan x="2060.0" dy="22">shortlist = Top 3(score &gt;= 70)</tspan><tspan x="2060.0" dy="22">final_report = coach_report(...active_matches...)</tspan><tspan x="2060.0" dy="22">messages += 报告完成消息</tspan></text><rect x="570" y="995" width="360" height="110" rx="14" ry="14" fill="#FFF7E6" stroke="#D48806" stroke-width="2"/><text x="750.0" y="1025.0" text-anchor="middle" font-size="16" font-weight="500" fill="#1F1F1F" font-family="PingFang SC, Helvetica, Arial, sans-serif"><tspan x="750.0" dy="0">Command.update</tspan><tspan x="750.0" dy="22">job_requirements =</tspan><tspan x="750.0" dy="22">extract_job_requirements(...)</tspan><tspan x="750.0" dy="22">goto position_job_node</tspan></text><rect x="570" y="1150" width="320" height="90" rx="14" ry="14" fill="#FFF7E6" stroke="#D48806" stroke-width="2"/><text x="730.0" y="1192.0" text-anchor="middle" font-size="16" font-weight="500" fill="#1F1F1F" font-family="PingFang SC, Helvetica, Arial, sans-serif"><tspan x="730.0" dy="0">return</tspan><tspan x="730.0" dy="22">analyses += [JobAnalysis]</tspan></text><rect x="1640" y="995" width="320" height="90" rx="14" ry="14" fill="#FFF7E6" stroke="#D48806" stroke-width="2"/><text x="1800.0" y="1026.0" text-anchor="middle" font-size="16" font-weight="500" fill="#1F1F1F" font-family="PingFang SC, Helvetica, Arial, sans-serif"><tspan x="1800.0" dy="0">return</tspan><tspan x="1800.0" dy="22">match_result =</tspan><tspan x="1800.0" dy="22">score_match(...)</tspan></text><rect x="1660" y="1150" width="400" height="90" rx="14" ry="14" fill="#FFF7E6" stroke="#D48806" stroke-width="2"/><text x="1860.0" y="1181.0" text-anchor="middle" font-size="16" font-weight="500" fill="#1F1F1F" font-family="PingFang SC, Helvetica, Arial, sans-serif"><tspan x="1860.0" dy="0">return</tspan><tspan x="1860.0" dy="22">matches += [MatchResult(</tspan><tspan x="1860.0" dy="22">review_round = 当前 optimization_round)]</tspan></text><rect x="120" y="1490" width="540" height="110" rx="18" ry="18" fill="#FFF7E6" stroke="#D48806" stroke-width="2"/><text x="390.0" y="1530.0" text-anchor="middle" font-size="18" font-weight="500" fill="#1F1F1F" font-family="PingFang SC, Helvetica, Arial, sans-serif"><tspan x="390.0" dy="0">active_matches 只筛选</tspan><tspan x="390.0" dy="24">review_round == optimization_round</tspan><tspan x="390.0" dy="24">的当前轮匹配结果</tspan></text><rect x="760" y="1480" width="760" height="140" rx="18" ry="18" fill="#FFF7E6" stroke="#D48806" stroke-width="2"/><text x="1140.0" y="1523.0" text-anchor="middle" font-size="18" font-weight="500" fill="#1F1F1F" font-family="PingFang SC, Helvetica, Arial, sans-serif"><tspan x="1140.0" dy="0">低分回路触发条件</tspan><tspan x="1140.0" dy="24">high_count == 0</tspan><tspan x="1140.0" dy="24">AND average_score &lt; 75</tspan><tspan x="1140.0" dy="24">AND optimization_round &lt; max_optimization_rounds</tspan></text><rect x="1600" y="1470" width="650" height="160" rx="18" ry="18" fill="#FFF7E6" stroke="#D48806" stroke-width="2"/><text x="1925.0" y="1523.0" text-anchor="middle" font-size="18" font-weight="500" fill="#1F1F1F" font-family="PingFang SC, Helvetica, Arial, sans-serif"><tspan x="1925.0" dy="0">Supervisor 实际决策机制</tspan><tspan x="1925.0" dy="24">1. fallback 代码兜底</tspan><tspan x="1925.0" dy="24">2. 参考 LLM 决策</tspan><tspan x="1925.0" dy="24">3. 经过 _is_step_allowed 合法性校验</tspan></text><rect x="120" y="1640" width="1020" height="80" rx="18" ry="18" fill="#FFF7E6" stroke="#D48806" stroke-width="2"/><text x="630.0" y="1688.0" text-anchor="middle" font-size="16" font-weight="500" fill="#1F1F1F" font-family="PingFang SC, Helvetica, Arial, sans-serif"><tspan x="630.0" dy="0">正常链路: START -&gt; supervisor -&gt; Send(job_analysis_flow x N) -&gt; supervisor -&gt; Send(match_flow x N) -&gt; supervisor -&gt; career_coach -&gt; supervisor -&gt; finish_node -&gt; END</tspan></text><rect x="1170" y="1640" width="1080" height="80" rx="18" ry="18" fill="#FFF7E6" stroke="#D48806" stroke-width="2"/><text x="1710.0" y="1688.0" text-anchor="middle" font-size="16" font-weight="500" fill="#1F1F1F" font-family="PingFang SC, Helvetica, Arial, sans-serif"><tspan x="1710.0" dy="0">低分回路链路: START -&gt; supervisor -&gt; Send(match_flow x N) 后若低分 -&gt; resume_optimizer -&gt; supervisor -&gt; 再次 Send(match_flow x N) -&gt; career_coach -&gt; finish_node</tspan></text><polygon points="760,310 920,390 760,470 600,390" fill="#E6F4FF" stroke="#1677F